<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Markdiff</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0a0a0a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>◇</text></svg>">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0a0a0a;
      --surface: #141414;
      --border: #2a2a2a;
      --text: #e8e0d4;
      --muted: #807e76;
      --accent: #e8009a;
      --green: #4ade80;
      --red: #f87171;
      --green-bg: rgba(74, 222, 128, 0.08);
      --red-bg: rgba(248, 113, 113, 0.08);
      --font-body: 'DM Sans', -apple-system, system-ui, sans-serif;
      --font-mono: 'IBM Plex Mono', 'SF Mono', monospace;
      --font-display: 'Georgia', serif;
      --sidebar-w: 260px;
    }

    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap');

    body {
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
    }

    /* Header */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 20px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      position: sticky;
      top: 0;
      z-index: 100;
      gap: 12px;
      flex-wrap: wrap;
    }

    .logo {
      font-family: var(--font-mono);
      font-size: 15px;
      font-weight: 500;
      color: var(--accent);
      letter-spacing: -0.5px;
      white-space: nowrap;
      cursor: pointer;
    }

    .filename {
      font-family: var(--font-mono);
      font-size: 13px;
      color: var(--muted);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 200px;
    }

    .header-actions {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .btn {
      font-family: var(--font-mono);
      font-size: 12px;
      padding: 6px 14px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text);
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }

    .btn:hover { border-color: var(--muted); }
    .btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
    .btn.primary { border-color: var(--accent); color: var(--accent); }
    .btn.primary:hover { background: var(--accent); color: #fff; }

    /* Tabs */
    .tabs {
      display: flex;
      gap: 2px;
      background: var(--bg);
      border-radius: 8px;
      padding: 2px;
    }

    .tab {
      font-family: var(--font-mono);
      font-size: 12px;
      padding: 5px 12px;
      border: none;
      background: transparent;
      color: var(--muted);
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .tab:hover { color: var(--text); }
    .tab.active { background: var(--surface); color: var(--text); }

    /* Layout: sidebar + main */
    .app-body {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    /* Sidebar */
    .sidebar {
      width: var(--sidebar-w);
      min-width: var(--sidebar-w);
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transition: margin-left 0.2s ease;
    }

    .sidebar.hidden {
      margin-left: calc(var(--sidebar-w) * -1);
    }

    .sidebar-header {
      padding: 12px 14px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .sidebar-header .folder-name {
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--text);
      font-weight: 500;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      flex: 1;
    }

    .sidebar-search {
      padding: 8px 14px;
      border-bottom: 1px solid var(--border);
    }

    .sidebar-search input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 12px;
      padding: 6px 10px;
      border-radius: 6px;
      outline: none;
    }

    .sidebar-search input:focus { border-color: var(--muted); }
    .sidebar-search input::placeholder { color: var(--muted); }

    .file-list {
      flex: 1;
      overflow-y: auto;
      padding: 4px 0;
    }

    .file-item {
      padding: 7px 14px;
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: all 0.1s;
      border-left: 2px solid transparent;
    }

    .file-item:hover { color: var(--text); background: rgba(255,255,255,0.03); }
    .file-item.active { color: var(--text); background: rgba(232, 0, 154, 0.08); border-left-color: var(--accent); }

    .file-item .modified-dot {
      width: 5px;
      height: 5px;
      background: var(--accent);
      border-radius: 50%;
      flex-shrink: 0;
      visibility: hidden;
    }

    .file-item .modified-dot.visible { visibility: visible; }

    .file-item .file-label {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      flex: 1;
    }

    .folder-toggle {
      padding: 6px 14px;
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      user-select: none;
    }

    .folder-toggle:hover { color: var(--text); }
    .folder-toggle .arrow { transition: transform 0.15s; font-size: 9px; }
    .folder-toggle .arrow.open { transform: rotate(90deg); }

    /* Main */
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-width: 0;
    }

    /* Empty state */
    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      text-align: center;
      gap: 16px;
    }

    .empty-state .icon {
      font-size: 48px;
      opacity: 0.3;
    }

    .empty-state p {
      color: var(--muted);
      font-size: 15px;
      max-width: 340px;
      line-height: 1.6;
    }

    .drop-zone {
      border: 2px dashed var(--border);
      border-radius: 12px;
      padding: 40px;
      transition: all 0.2s;
      width: 100%;
      max-width: 400px;
    }

    .drop-zone.over {
      border-color: var(--accent);
      background: rgba(232, 0, 154, 0.05);
    }

    .empty-actions {
      display: flex;
      gap: 10px;
      margin-top: 8px;
    }

    /* Content panels */
    .panel {
      flex: 1;
      overflow-y: auto;
      padding: 24px 20px;
      display: none;
    }

    .panel.visible { display: block; }

    /* Rendered markdown */
    .rendered {
      max-width: 720px;
      margin: 0 auto;
      line-height: 1.7;
      font-size: 16px;
    }

    .rendered h1, .rendered h2, .rendered h3, .rendered h4 {
      font-family: var(--font-display);
      margin: 1.5em 0 0.5em;
      line-height: 1.3;
    }

    .rendered h1 { font-size: 28px; }
    .rendered h2 { font-size: 22px; border-bottom: 1px solid var(--border); padding-bottom: 8px; }
    .rendered h3 { font-size: 18px; }

    .rendered p { margin: 0.8em 0; }
    .rendered a { color: var(--accent); text-decoration: none; }
    .rendered a:hover { text-decoration: underline; }

    .rendered code {
      font-family: var(--font-mono);
      font-size: 0.88em;
      background: var(--surface);
      padding: 2px 6px;
      border-radius: 4px;
    }

    .rendered pre {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
      overflow-x: auto;
      margin: 1em 0;
    }

    .rendered pre code {
      background: none;
      padding: 0;
      font-size: 13px;
      line-height: 1.6;
    }

    .rendered blockquote {
      border-left: 3px solid var(--accent);
      padding-left: 16px;
      color: var(--muted);
      margin: 1em 0;
    }

    .rendered ul, .rendered ol { padding-left: 24px; margin: 0.8em 0; }
    .rendered li { margin: 0.3em 0; }

    .rendered img {
      max-width: 100%;
      border-radius: 8px;
      margin: 1em 0;
    }

    .rendered hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 2em 0;
    }

    .rendered table {
      width: 100%;
      border-collapse: collapse;
      margin: 1em 0;
      font-size: 14px;
    }

    .rendered th, .rendered td {
      border: 1px solid var(--border);
      padding: 8px 12px;
      text-align: left;
    }

    .rendered th { background: var(--surface); font-weight: 600; }

    /* Editor */
    .editor {
      width: 100%;
      max-width: 720px;
      margin: 0 auto;
      height: 100%;
      min-height: 300px;
      background: transparent;
      border: none;
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 14px;
      line-height: 1.7;
      resize: none;
      outline: none;
      padding: 0;
    }

    /* Diff */
    .diff-view {
      max-width: 720px;
      margin: 0 auto;
      font-family: var(--font-mono);
      font-size: 13px;
      line-height: 1.7;
    }

    .diff-line {
      padding: 1px 12px;
      border-radius: 3px;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .diff-add { background: var(--green-bg); color: var(--green); }
    .diff-remove { background: var(--red-bg); color: var(--red); }
    .diff-context { color: var(--muted); }

    .diff-stats {
      display: flex;
      gap: 16px;
      margin-bottom: 12px;
      font-size: 12px;
    }

    .diff-stats .additions { color: var(--green); }
    .diff-stats .deletions { color: var(--red); }

    .no-changes {
      color: var(--muted);
      text-align: center;
      padding: 40px 0;
      font-size: 14px;
    }

    /* Change indicator */
    .change-dot {
      width: 6px;
      height: 6px;
      background: var(--accent);
      border-radius: 50%;
      display: none;
    }

    .change-dot.visible { display: inline-block; }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 10px 20px;
      border-radius: 8px;
      font-family: var(--font-mono);
      font-size: 13px;
      transition: transform 0.3s ease;
      z-index: 200;
    }

    .toast.show { transform: translateX(-50%) translateY(0); }

    /* Mobile sidebar overlay */
    .sidebar-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 50;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .sidebar {
        position: fixed;
        top: 0;
        left: 0;
        bottom: 0;
        z-index: 60;
        margin-left: 0;
      }

      .sidebar.hidden {
        margin-left: calc(var(--sidebar-w) * -1);
      }

      .sidebar:not(.hidden) + .sidebar-overlay {
        display: block;
      }

      header { padding: 10px 14px; }
      .panel { padding: 20px 14px; }
      .rendered { font-size: 15px; }
      .filename { max-width: 120px; }
      .btn { padding: 6px 10px; font-size: 11px; }
      .tab { padding: 5px 8px; font-size: 11px; }
    }

    /* File input hidden */
    #file-input { display: none; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  </style>
</head>
<body>

  <header>
    <div style="display:flex; align-items:center; gap:12px;">
      <span class="logo" id="toggle-sidebar" title="Toggle sidebar">markdiff</span>
      <span class="filename" id="filename"></span>
      <span class="change-dot" id="change-dot" title="Unsaved changes"></span>
    </div>

    <div class="tabs" id="view-tabs" style="display:none;">
      <button class="tab active" data-view="read">Read</button>
      <button class="tab" data-view="edit">Edit</button>
      <button class="tab" data-view="diff">Diff</button>
    </div>

    <div class="header-actions">
      <button class="btn" id="paste-btn" title="Paste markdown from clipboard">Paste</button>
      <button class="btn" id="folder-btn">Folder</button>
      <button class="btn primary" id="open-btn">Open</button>
      <button class="btn" id="copy-btn" style="display:none;" title="Copy current content">Copy</button>
      <button class="btn" id="copy-diff-btn" style="display:none;" title="Copy diff to send back to Claude">Copy Diff</button>
      <button class="btn" id="save-btn" style="display:none;">Save</button>
    </div>
  </header>

  <input type="file" id="file-input" accept=".md,.markdown,.txt,.mdx">

  <div class="app-body">
    <!-- Sidebar -->
    <aside class="sidebar hidden" id="sidebar">
      <div class="sidebar-header">
        <span class="folder-name" id="folder-name">No folder open</span>
        <button class="btn" id="change-folder-btn" style="padding:4px 8px; font-size:11px;">Change</button>
      </div>
      <div class="sidebar-search">
        <input type="text" id="file-search" placeholder="Filter files...">
      </div>
      <div class="file-list" id="file-list"></div>
    </aside>
    <div class="sidebar-overlay" id="sidebar-overlay"></div>

    <main>
      <!-- Empty state -->
      <div class="empty-state" id="empty-state">
        <div class="drop-zone" id="drop-zone">
          <div class="icon">◇</div>
          <p>Paste markdown from Claude, drop a file, or open a folder. Edit it, then copy the diff back.</p>
          <div class="empty-actions">
            <button class="btn primary" id="empty-paste-btn">Paste from Claude</button>
            <button class="btn" id="empty-open-btn">Open File</button>
            <button class="btn" id="empty-folder-btn">Open Folder</button>
          </div>
        </div>
      </div>

      <!-- Read panel -->
      <div class="panel" id="panel-read">
        <div class="rendered" id="rendered-content"></div>
      </div>

      <!-- Edit panel -->
      <div class="panel" id="panel-edit">
        <textarea class="editor" id="editor" spellcheck="true"></textarea>
      </div>

      <!-- Diff panel -->
      <div class="panel" id="panel-diff">
        <div class="diff-view" id="diff-content"></div>
      </div>
    </main>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js');
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/diff/dist/diff.min.js"></script>
  <script>
    // State
    let originalContent = '';
    let currentContent = '';
    let currentFilename = '';
    let currentView = 'read';
    let fileHandle = null;
    let dirHandle = null;
    let fileTree = []; // { path, name, handle, depth, isDir, expanded }
    let fileHandles = new Map(); // path -> { handle, original }
    let activeFilePath = null;
    let modifiedFiles = new Set();

    // Elements
    const fileInput = document.getElementById('file-input');
    const openBtn = document.getElementById('open-btn');
    const saveBtn = document.getElementById('save-btn');
    const folderBtn = document.getElementById('folder-btn');
    const emptyState = document.getElementById('empty-state');
    const viewTabs = document.getElementById('view-tabs');
    const filenameEl = document.getElementById('filename');
    const changeDot = document.getElementById('change-dot');
    const renderedContent = document.getElementById('rendered-content');
    const editor = document.getElementById('editor');
    const diffContent = document.getElementById('diff-content');
    const dropZone = document.getElementById('drop-zone');
    const toastEl = document.getElementById('toast');
    const sidebar = document.getElementById('sidebar');
    const sidebarOverlay = document.getElementById('sidebar-overlay');
    const folderNameEl = document.getElementById('folder-name');
    const fileListEl = document.getElementById('file-list');
    const fileSearch = document.getElementById('file-search');

    // Configure marked
    marked.setOptions({ breaks: true, gfm: true });

    // ── Folder browsing ──

    async function openFolder() {
      if (!('showDirectoryPicker' in window)) {
        toast('Folder browsing needs Chrome, Edge, or Arc');
        return;
      }
      try {
        dirHandle = await window.showDirectoryPicker({ mode: 'readwrite' });
      } catch (e) {
        if (e.name === 'AbortError') return;
        toast('Could not open folder');
        return;
      }

      folderNameEl.textContent = dirHandle.name;
      sidebar.classList.remove('hidden');
      await scanDirectory();
    }

    async function scanDirectory() {
      fileTree = [];
      fileHandles.clear();
      await walkDir(dirHandle, '', 0);
      fileTree.sort((a, b) => {
        if (a.isDir !== b.isDir) return a.isDir ? -1 : 1;
        return a.path.localeCompare(b.path);
      });
      renderFileList();
    }

    async function walkDir(handle, prefix, depth) {
      const entries = [];
      for await (const entry of handle.values()) {
        entries.push(entry);
      }
      entries.sort((a, b) => a.name.localeCompare(b.name));

      for (const entry of entries) {
        // Skip hidden files/dirs
        if (entry.name.startsWith('.')) continue;

        const path = prefix ? `${prefix}/${entry.name}` : entry.name;

        if (entry.kind === 'directory') {
          fileTree.push({ path, name: entry.name, handle: entry, depth, isDir: true, expanded: depth === 0 });
          if (depth < 3) {
            await walkDir(entry, path, depth + 1);
          }
        } else if (/\.(md|markdown|mdx|txt)$/i.test(entry.name)) {
          fileTree.push({ path, name: entry.name, handle: entry, depth, isDir: false });
          fileHandles.set(path, { handle: entry, original: null });
        }
      }
    }

    function renderFileList(filter = '') {
      const lowerFilter = filter.toLowerCase();
      let html = '';
      const expandedDirs = new Set(fileTree.filter(f => f.isDir && f.expanded).map(f => f.path));

      for (const item of fileTree) {
        // Check if parent dir is expanded
        if (item.depth > 0) {
          const parentPath = item.path.substring(0, item.path.lastIndexOf('/'));
          if (!expandedDirs.has(parentPath)) continue;
        }

        if (filter && !item.isDir && !item.name.toLowerCase().includes(lowerFilter)) continue;

        const indent = item.depth * 16;

        if (item.isDir) {
          const arrow = item.expanded ? 'open' : '';
          html += `<div class="folder-toggle" style="padding-left:${14 + indent}px" data-path="${item.path}">
            <span class="arrow ${arrow}">▶</span> ${escapeHtml(item.name)}
          </div>`;
        } else {
          const isActive = item.path === activeFilePath;
          const isModified = modifiedFiles.has(item.path);
          html += `<div class="file-item ${isActive ? 'active' : ''}" style="padding-left:${14 + indent}px" data-path="${item.path}">
            <span class="modified-dot ${isModified ? 'visible' : ''}"></span>
            <span class="file-label">${escapeHtml(item.name)}</span>
          </div>`;
        }
      }

      if (!html) {
        html = '<div style="padding:20px 14px; color:var(--muted); font-size:12px; font-family:var(--font-mono);">No markdown files found</div>';
      }

      fileListEl.innerHTML = html;

      // Bind clicks
      fileListEl.querySelectorAll('.file-item').forEach(el => {
        el.addEventListener('click', () => openFileFromTree(el.dataset.path));
      });
      fileListEl.querySelectorAll('.folder-toggle').forEach(el => {
        el.addEventListener('click', () => toggleFolder(el.dataset.path));
      });
    }

    function toggleFolder(path) {
      const item = fileTree.find(f => f.path === path && f.isDir);
      if (item) {
        item.expanded = !item.expanded;
        renderFileList(fileSearch.value);
      }
    }

    async function openFileFromTree(path) {
      // Save current edits before switching
      if (activeFilePath && currentContent !== originalContent) {
        modifiedFiles.add(activeFilePath);
        // Store edited content
        const entry = fileHandles.get(activeFilePath);
        if (entry) entry.editedContent = currentContent;
      }

      const entry = fileHandles.get(path);
      if (!entry) return;

      try {
        const file = await entry.handle.getFile();
        const text = await file.text();

        // Store original if first time opening
        if (entry.original === null) entry.original = text;

        activeFilePath = path;
        fileHandle = entry.handle;
        currentFilename = entry.handle.name;

        // Use edited content if we have it, otherwise the file
        originalContent = entry.original;
        currentContent = entry.editedContent !== undefined ? entry.editedContent : text;

        filenameEl.textContent = currentFilename;
        emptyState.style.display = 'none';
        viewTabs.style.display = 'flex';
        saveBtn.style.display = 'inline-flex';

        render();
        showCopyButtons();
        if (currentView === 'edit') {
          editor.value = currentContent;
        } else if (currentView === 'diff') {
          renderDiff();
        } else {
          switchView('read');
        }
        updateChangeDot();
        renderFileList(fileSearch.value);

        // Close sidebar on mobile
        if (window.innerWidth <= 768) {
          sidebar.classList.add('hidden');
        }
      } catch (e) {
        toast('Could not read file');
      }
    }

    // Search files
    fileSearch.addEventListener('input', () => renderFileList(fileSearch.value));

    // Folder buttons
    folderBtn.addEventListener('click', openFolder);
    document.getElementById('empty-folder-btn').addEventListener('click', openFolder);
    document.getElementById('change-folder-btn').addEventListener('click', openFolder);
    document.getElementById('empty-open-btn').addEventListener('click', () => openBtn.click());

    // Toggle sidebar
    document.getElementById('toggle-sidebar').addEventListener('click', () => {
      sidebar.classList.toggle('hidden');
    });
    sidebarOverlay.addEventListener('click', () => {
      sidebar.classList.add('hidden');
    });

    // ── Paste from clipboard (Claude workflow) ──

    const pasteBtn = document.getElementById('paste-btn');
    const copyBtn = document.getElementById('copy-btn');
    const copyDiffBtn = document.getElementById('copy-diff-btn');

    async function pasteFromClipboard() {
      try {
        const text = await navigator.clipboard.readText();
        if (!text.trim()) {
          toast('Clipboard is empty');
          return;
        }
        originalContent = text;
        currentContent = text;
        currentFilename = 'clipboard.md';
        activeFilePath = null;
        fileHandle = null;

        filenameEl.textContent = 'Pasted from clipboard';
        emptyState.style.display = 'none';
        viewTabs.style.display = 'flex';
        saveBtn.style.display = 'inline-flex';
        copyBtn.style.display = 'inline-flex';
        copyDiffBtn.style.display = 'inline-flex';

        render();
        switchView('read');
        updateChangeDot();
        toast('Pasted — edit and check Diff when done');
      } catch (e) {
        toast('Could not read clipboard');
      }
    }

    pasteBtn.addEventListener('click', pasteFromClipboard);
    document.getElementById('empty-paste-btn').addEventListener('click', pasteFromClipboard);

    // Copy edited content
    copyBtn.addEventListener('click', async () => {
      try {
        await navigator.clipboard.writeText(currentContent);
        toast('Copied edited content');
      } catch (e) {
        toast('Could not copy');
      }
    });

    // Copy diff as text (paste into Claude to show your changes)
    copyDiffBtn.addEventListener('click', async () => {
      if (originalContent === currentContent) {
        toast('No changes to copy');
        return;
      }
      const diff = Diff.diffLines(originalContent, currentContent);
      let diffText = `Here are my edits to your markdown:\n\n\`\`\`diff\n`;
      diff.forEach(part => {
        const lines = part.value.split('\n');
        if (lines[lines.length - 1] === '') lines.pop();
        lines.forEach(line => {
          if (part.added) diffText += `+ ${line}\n`;
          else if (part.removed) diffText += `- ${line}\n`;
          else diffText += `  ${line}\n`;
        });
      });
      diffText += '```';

      try {
        await navigator.clipboard.writeText(diffText);
        toast('Diff copied — paste into Claude');
      } catch (e) {
        toast('Could not copy');
      }
    });

    // Show copy buttons when file is loaded
    function showCopyButtons() {
      copyBtn.style.display = 'inline-flex';
      copyDiffBtn.style.display = 'inline-flex';
    }

    // ── Single file open ──

    openBtn.addEventListener('click', async () => {
      if ('showOpenFilePicker' in window) {
        try {
          const [handle] = await window.showOpenFilePicker({
            types: [{ description: 'Markdown', accept: { 'text/markdown': ['.md', '.markdown', '.mdx'] } }],
          });
          fileHandle = handle;
          const file = await handle.getFile();
          await loadFile(file);
          return;
        } catch (e) {
          if (e.name === 'AbortError') return;
        }
      }
      fileInput.click();
    });

    fileInput.addEventListener('change', (e) => {
      if (e.target.files[0]) {
        fileHandle = null;
        loadFile(e.target.files[0]);
      }
    });

    // Drag and drop
    document.body.addEventListener('dragover', (e) => {
      e.preventDefault();
      dropZone?.classList.add('over');
    });

    document.body.addEventListener('dragleave', () => {
      dropZone?.classList.remove('over');
    });

    document.body.addEventListener('drop', (e) => {
      e.preventDefault();
      dropZone?.classList.remove('over');
      const file = e.dataTransfer.files[0];
      if (file && /\.(md|markdown|mdx|txt)$/i.test(file.name)) {
        fileHandle = null;
        loadFile(file);
      }
    });

    async function loadFile(file) {
      const text = await file.text();
      originalContent = text;
      currentContent = text;
      currentFilename = file.name;
      activeFilePath = null;

      filenameEl.textContent = file.name;
      emptyState.style.display = 'none';
      viewTabs.style.display = 'flex';
      saveBtn.style.display = 'inline-flex';

      render();
      showCopyButtons();
      switchView('read');
      updateChangeDot();
    }

    // ── Views ──

    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => switchView(tab.dataset.view));
    });

    function switchView(view) {
      currentView = view;
      document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.view === view));
      document.querySelectorAll('.panel').forEach(p => p.classList.remove('visible'));

      if (view === 'read') {
        render();
        document.getElementById('panel-read').classList.add('visible');
      } else if (view === 'edit') {
        editor.value = currentContent;
        document.getElementById('panel-edit').classList.add('visible');
        editor.focus();
      } else if (view === 'diff') {
        renderDiff();
        document.getElementById('panel-diff').classList.add('visible');
      }
    }

    function render() {
      renderedContent.innerHTML = marked.parse(currentContent);
    }

    // Editor input
    editor.addEventListener('input', () => {
      currentContent = editor.value;
      updateChangeDot();
      if (activeFilePath) {
        const entry = fileHandles.get(activeFilePath);
        if (entry) entry.editedContent = currentContent;
        if (currentContent !== originalContent) {
          modifiedFiles.add(activeFilePath);
        } else {
          modifiedFiles.delete(activeFilePath);
        }
        renderFileList(fileSearch.value);
      }
    });

    // Diff
    function renderDiff() {
      if (originalContent === currentContent) {
        diffContent.innerHTML = '<div class="no-changes">No changes from original</div>';
        return;
      }

      const diff = Diff.diffLines(originalContent, currentContent);
      let additions = 0;
      let deletions = 0;
      let html = '';

      diff.forEach(part => {
        const lines = part.value.split('\n');
        if (lines[lines.length - 1] === '') lines.pop();

        lines.forEach(line => {
          const escaped = escapeHtml(line);
          if (part.added) {
            additions++;
            html += `<div class="diff-line diff-add">+ ${escaped}</div>`;
          } else if (part.removed) {
            deletions++;
            html += `<div class="diff-line diff-remove">- ${escaped}</div>`;
          } else {
            html += `<div class="diff-line diff-context">  ${escaped}</div>`;
          }
        });
      });

      diffContent.innerHTML = `
        <div class="diff-stats">
          <span class="additions">+${additions} added</span>
          <span class="deletions">-${deletions} removed</span>
        </div>
      ` + html;
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function updateChangeDot() {
      changeDot.classList.toggle('visible', originalContent !== currentContent);
    }

    // ── Save ──

    saveBtn.addEventListener('click', async () => {
      // Try writing back via File System Access
      const handle = activeFilePath ? fileHandles.get(activeFilePath)?.handle : fileHandle;
      if (handle && handle.createWritable) {
        try {
          const writable = await handle.createWritable();
          await writable.write(currentContent);
          await writable.close();
          originalContent = currentContent;
          if (activeFilePath) {
            const entry = fileHandles.get(activeFilePath);
            if (entry) {
              entry.original = currentContent;
              delete entry.editedContent;
            }
            modifiedFiles.delete(activeFilePath);
            renderFileList(fileSearch.value);
          }
          updateChangeDot();
          toast('Saved');
          return;
        } catch (e) {
          // Fall through to download
        }
      }

      // Fallback: download
      const blob = new Blob([currentContent], { type: 'text/markdown' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = currentFilename || 'document.md';
      a.click();
      URL.revokeObjectURL(url);
      originalContent = currentContent;
      updateChangeDot();
      toast('Downloaded');
    });

    // ── Keyboard shortcuts ──

    document.addEventListener('keydown', (e) => {
      if ((e.metaKey || e.ctrlKey) && e.key === 's') {
        e.preventDefault();
        saveBtn.click();
      }
      if ((e.metaKey || e.ctrlKey) && e.key === 'o') {
        e.preventDefault();
        openBtn.click();
      }
      if ((e.metaKey || e.ctrlKey) && e.key === '1') { e.preventDefault(); switchView('read'); }
      if ((e.metaKey || e.ctrlKey) && e.key === '2') { e.preventDefault(); switchView('edit'); }
      if ((e.metaKey || e.ctrlKey) && e.key === '3') { e.preventDefault(); switchView('diff'); }
      if ((e.metaKey || e.ctrlKey) && e.key === 'b') {
        e.preventDefault();
        sidebar.classList.toggle('hidden');
      }
      // Navigate files with arrow keys when sidebar focused
    });

    // Toast
    function toast(msg) {
      toastEl.textContent = msg;
      toastEl.classList.add('show');
      setTimeout(() => toastEl.classList.remove('show'), 2000);
    }
  </script>
</body>
</html>
